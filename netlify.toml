[build]
  base = "artifacts/sol-customs"
  command = "cd ../.. && pnpm install --frozen-lockfile=false && pnpm --filter @workspace/sol-customs run build"
  publish = "dist/public"

[build.environment]
  BASE_PATH = "/"
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
